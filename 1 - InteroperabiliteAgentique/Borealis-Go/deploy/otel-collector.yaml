# Configuration du collecteur OpenTelemetry (M4.3) : reçoit l'OTLP des services
# Borealis (traces A2A + MCP corrélées par task id, NFR-07) et les exporte vers
# Jaeger. Aucun exporteur vers Internet (cohérent avec le 0 egress du mesh).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true # réseau interne fermé

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
