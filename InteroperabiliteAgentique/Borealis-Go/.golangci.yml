# golangci-lint v1 (verrouillé sur v1.64.8, comme FibGo). Rigueur élevée ;
# le gate check.sh traite le lint comme dur s'il est présent.
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - typecheck
    - revive
    - gocyclo
    - funlen
    - whitespace
    # misspell désactivé : commentaires en français (convention projet) ; le
    # linter ne gère que des locales anglaises → faux positifs sur la prose FR.
    - bodyclose
    - noctx
    - prealloc
    - gocritic
    - unconvert
    - nakedret
    - copyloopvar
    - gosec
    - nolintlint

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocyclo:
    min-complexity: 15
  funlen:
    lines: 100
    statements: 60
  revive:
    severity: warning
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
          - sayRepetitiveInsteadOfStutters
      - name: package-comments
      - name: error-naming

issues:
  exclude-rules:
    # Les tests tolèrent errcheck/gosec (assertions, données synthétiques).
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - funlen
  max-issues-per-linter: 0
  max-same-issues: 0
