# docker-compose du démonstrateur Borealis (M4.3) : orchestrateur + 4 agents A2A
# + 4 serveurs MCP (HTTP streamable) + collecteur OTel + Jaeger.
#
# 0 EGRESS (NFR-06) : le réseau applicatif `mesh` est `internal: true` — aucun
# conteneur ne peut sortir vers Internet. Seule l'UI Jaeger est publiée, via un
# second réseau `edge` réservé à l'inbound. Test d'hôtes en M5.
#
# ⚠ NON VÉRIFIÉ LOCALEMENT : Docker absent de l'hôte d'exécution (voir
# docs/REPRODUCIBILITY.md). Artefact de déploiement livré, `docker compose up`
# non exécuté. Données 100 % synthétiques.

name: borealis

x-mcp: &mcp
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  networks: [mesh]
  restart: unless-stopped
  # NB : ne PAS mettre d'environment ici. Le merge YAML `<<` ne fusionne pas les
  # mappings imbriqués — chaque service redéfinit `environment`, ce qui écraserait
  # une variable posée sur l'ancre. Quand l'exportateur OTLP sera câblé (reliquat,
  # cf. docs/REPRODUCIBILITY.md), ajouter OTEL_EXPORTER_OTLP_ENDPOINT à CHAQUE
  # service (http://otel-collector:4317).

services:
  # --- Serveurs MCP (tiers TIC), transport HTTP streamable ---
  mcp-identity:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: mcp-identity } }
    environment: { MCP_HTTP_ADDR: ":9001" }
  mcp-bureau:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: mcp-bureau } }
    environment: { MCP_HTTP_ADDR: ":9002" }
  mcp-capacity:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: mcp-capacity } }
    environment: { MCP_HTTP_ADDR: ":9003" }
  mcp-policy:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: mcp-policy } }
    environment: { MCP_HTTP_ADDR: ":9004" }

  # --- Agents A2A (HTTP) ---
  # IDP_SECRET : requis par la garde m9 (sortie code 3 sinon → crash-loop avec
  # restart: unless-stopped). Interpolé depuis l'environnement de l'hôte au
  # `docker compose up` (échec explicite si absent) — JAMAIS de valeur committée
  # ici : un secret en clair dans ce fichier rendrait les jetons forgeables par
  # quiconque lit le dépôt. (Posé par service : merge YAML `<<` inopérant, cf. NB.)
  agent-kyc:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: agent-kyc } }
    environment: { ADDR: ":8081", BASE_URL: "http://agent-kyc:8081", IDP_SECRET: "${IDP_SECRET:?IDP_SECRET requis (garde m9)}" }
  agent-scoring:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: agent-scoring } }
    environment: { ADDR: ":8082", BASE_URL: "http://agent-scoring:8082", IDP_SECRET: "${IDP_SECRET:?IDP_SECRET requis (garde m9)}" }
  agent-policy:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: agent-policy } }
    environment: { ADDR: ":8083", BASE_URL: "http://agent-policy:8083", IDP_SECRET: "${IDP_SECRET:?IDP_SECRET requis (garde m9)}" }
  agent-explain:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: agent-explain } }
    environment: { ADDR: ":8084", BASE_URL: "http://agent-explain:8084", IDP_SECRET: "${IDP_SECRET:?IDP_SECRET requis (garde m9)}" }

  # --- Orchestrateur A2A ---
  orchestrator:
    <<: *mcp
    build: { context: .., dockerfile: deploy/Dockerfile, args: { BIN: orchestrator } }
    environment: { ADDR: ":8080", BASE_URL: "http://orchestrator:8080", IDP_SECRET: "${IDP_SECRET:?IDP_SECRET requis (garde m9)}" }
    depends_on: [agent-kyc, agent-scoring, agent-policy, agent-explain]

  # --- Observabilité ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0 # ⚠ épingler par digest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    networks: [mesh]
    depends_on: [jaeger]
  jaeger:
    image: jaegertracing/all-in-one:1.57 # ⚠ épingler par digest
    networks: [mesh, edge]
    ports:
      # UI Jaeger (inbound seul, via le réseau edge), liée à 127.0.0.1 : l'UI
      # est sans authentification — la publier sur 0.0.0.0 l'exposerait au LAN.
      - "127.0.0.1:16686:16686"

networks:
  mesh:
    internal: true # 0 egress : aucun accès sortant depuis les conteneurs applicatifs
  edge: {}
