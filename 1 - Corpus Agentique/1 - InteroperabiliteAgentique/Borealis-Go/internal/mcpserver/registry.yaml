# Registre des serveurs MCP comme **tiers TIC** (fournisseurs de services
# numériques ; posture DORA / Loi 25 illustrative — ADR-0009). Chaque entrée
# porte un SLO de latence, une version de contrat et l'énum d'erreurs exposée.
# Les valeurs de SLO sont des hypothèses à calibrer (PRD §17).
servers:
  - name: identity-hub
    tier: TIC
    contractVersion: "1.0.0"
    sloP95Ms: 300
    tools: [verify_identity, check_watchlists]
    errors: [InvalidInput, ServiceUnavailable, Unauthorized, NotFound]
  - name: credit-bureau-sim
    tier: TIC
    contractVersion: "1.0.0"
    sloP95Ms: 200
    tools: [get_credit_report]
    errors: [InvalidInput, ServiceUnavailable, NotFound]
  - name: capacity-calculator
    tier: TIC
    contractVersion: "1.0.0"
    sloP95Ms: 100
    tools: [compute_capacity]
    errors: [InvalidInput, ServiceUnavailable]
  - name: policy-engine
    tier: TIC
    contractVersion: "1.0.0"
    sloP95Ms: 250
    tools: [evaluate_policy]
    errors: [InvalidInput, ServiceUnavailable, NotFound]
